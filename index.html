<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RollyRoyal Plinko</title>
    <link rel="icon" href="favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="main-container">
        <!-- Top Section: Game and HUD -->
        <div class="top-section">
            <aside class="history-pane">
                <div class="hud-group">
                    <label>Recent History</label>
                    <div id="historyList" class="history-list">
                        <!-- History entries will be added here -->
                    </div>
                </div>
            </aside>

            <div class="game-pane">
                <img src="favicon/android-chrome-512x512.png" alt="RollyRoyal Logo" class="game-logo">
                <canvas id="plinkoCanvas"></canvas>
            </div>
            
            <aside class="hud-pane">
                <div class="hud-group balance-section">
                    <div class="hud-header">
                        <label>Balance</label>
                        <div class="hud-controls">
                            <button id="tutorialBtn" class="icon-btn" title="How to Play">❓</button>
                            <button id="soundToggle" class="icon-btn" title="Toggle Sound">🔊</button>
                        </div>
                    </div>
                    <div id="userBalance">₱1000.00</div>
                    <button id="resetBalance" class="secondary-btn">Reset Balance</button>
                </div>

                <audio id="bgMusic" loop>
                    <source src="mp3/Michael Giacchino - Life s Incredible Again.mp3" type="audio/mpeg">
                </audio>

                <div class="hud-group">
                    <label>Bet Amount</label>
                    <div class="bet-input-wrapper">
                        <input type="number" id="betAmount" value="10.00" step="1.00" min="1.00">
                        <div class="bet-shortcuts">
                            <button id="minBet">MIN</button>
                            <button id="maxBet">MAX</button>
                        </div>
                    </div>
                </div>

                <div class="hud-group">
                    <label>Risk Level</label>
                    <select id="riskLevel">
                        <option value="low">Low</option>
                        <option value="normal" selected>Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="hud-group">
                    <label>Lines: <span id="lineValue">8</span></label>
                    <input type="range" id="linesCount" min="8" max="16" value="8">
                </div>

                <div class="hud-group collapsible">
                    <div id="petsToggleHeader" class="section-header">
                        <label>Active Pets</label>
                        <span id="petsToggleIcon" class="toggle-icon">▼</span>
                    </div>
                    <div class="pet-toggles collapsed" id="petToggles">
                        <!-- Toggles for Alwyn, Asher, Beto, Colmo, Gab, Kyle, Renz -->
                    </div>
                </div>

                <div class="actions">
                    <button id="playBtn" class="primary-btn">PLAY</button>
                    <button id="receiptBtn" class="secondary-btn">Save Receipt</button>
                </div>
            </aside>
        </div>

        <!-- Bottom Section: Pets Area -->
        <div class="pets-section">
            <canvas id="petsCanvas"></canvas>
        </div>
    </div>
    <!-- Tutorial System -->
    <div id="tutorialOverlay" class="tutorial-overlay hidden"></div>
    <div id="tutorialBox" class="tutorial-box hidden">
        <div class="tutorial-header">
            <span class="tutorial-title">RollyRoyal Guide</span>
            <button id="skipTutorial" class="skip-link">Skip</button>
        </div>
        <div class="tutorial-content" id="tutorialContent">
            <!-- Step content injected here -->
        </div>
        <div class="tutorial-footer">
            <div class="step-dots" id="stepDots"></div>
            <button id="nextStep" class="primary-btn tutorial-next">NEXT</button>
        </div>
    </div>

    <script src="script/script.js"></script>
</body>
</html>
