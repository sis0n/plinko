<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RollyRoyal Plinko</title>
    <link rel="icon" href="favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="main-container">
        <!-- Top Section: Game and HUD -->
        <div class="top-section">
            <aside class="history-pane">
                <div class="hud-group">
                    <label>Recent History</label>
                    <div id="historyList" class="history-list">
                        <!-- History entries will be added here -->
                    </div>
                </div>
            </aside>

            <div class="game-pane">
                <img src="favicon/android-chrome-512x512.png" alt="RollyRoyal Logo" class="game-logo">
                <canvas id="plinkoCanvas"></canvas>
            </div>
            
            <aside class="hud-pane">
                <div class="hud-group balance-section">
                    <div class="hud-header">
                        <label>Balance</label>
                        <div class="hud-header-actions">
                            <button id="shopBtn" class="icon-btn" title="Shop">🛒</button>
                            <button id="achievementsBtn" class="icon-btn" title="Achievements">🏆</button>
                            <div class="hud-menu">
                                <button class="burger-btn" aria-label="Menu">&#9776;</button>
                                <div class="hud-controls">
                                    <button id="zeroBalance" class="icon-btn" title="Set Balance to 0">0️⃣</button>
                                    <button id="tutorialBtn" class="icon-btn" title="How to Play">❓</button>
                                    <button id="musicToggle" class="icon-btn" title="Toggle Music">🎵</button>
                                    <button id="sfxToggle" class="icon-btn" title="Toggle SFX">🔊</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="userBalance">⭐1000</div>
                    <div id="streakDisplay" class="streak-display" style="display: none;"></div>
                    <div id="activePowerupsDisplay" class="active-powerups" style="display: none;"></div>
                    <div id="levelDisplay" class="level-display"></div>
                    <button id="resetBalance" class="secondary-btn">Reset Balance</button>
                </div>

                <audio id="bgMusic" loop>
                    <source src="mp3/Michael Giacchino - Life s Incredible Again.mp3" type="audio/mpeg">
                </audio>
                <audio id="collectSound">
                    <source src="mp3/Collect-Item-Sound-Effect.mp3" type="audio/mpeg">
                </audio>
                <audio id="paldoSound">
                    <source src="mp3/paldo-nanaman.mp3" type="audio/mpeg">
                </audio>
                <audio id="pegSound">
                    <source src="mp3/sound2.wav" type="audio/wav">
                </audio>
                <audio id="playBtnSound">
                    <source src="mp3/fahhhhh.mp3" type="audio/mpeg">
                </audio>
                <audio id="minBetSound">
                    <source src="mp3/gay_UtmZQwk.mp3" type="audio/mpeg">
                </audio>
                <audio id="maxBetSound">
                    <source src="mp3/anita-max-win.mp3" type="audio/mpeg">
                </audio>
                <audio id="lossSound">
                    <source src="mp3/malupiton-aray-ko.mp3" type="audio/mpeg">
                </audio>
                <audio id="catLaughSound">
                    <source src="mp3/cat-laugh-meme-1.mp3" type="audio/mpeg">
                </audio>
                <audio id="tucoSound">
                    <source src="mp3/tuco-get-out.mp3" type="audio/mpeg">
                </audio>
                <audio id="tryAgainHoverSound">
                    <source src="mp3/another-one_dPvHt2Z.mp3" type="audio/mpeg">
                </audio>
                <audio id="cancelHoverSound">
                    <source src="mp3/gay_UtmZQwk.mp3" type="audio/mpeg">
                </audio>

                <div class="hud-group">
                    <label>Bet Amount</label>
                    <div class="bet-input-wrapper">
                        <input type="number" id="betAmount" value="10.00" step="1.00" min="1.00">
                        <div class="bet-shortcuts">
                            <button id="minBet">MIN</button>
                            <button id="maxBet">MAX</button>
                        </div>
                    </div>
                    <div class="bet-presets" id="betPresets"></div>
                    <div id="maxWinDisplay" class="max-win-display"></div>
                </div>

                <div class="hud-group">
                    <label>Risk Level</label>
                    <select id="riskLevel">
                        <option value="low">Low</option>
                        <option value="normal" selected>Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="hud-group">
                    <label>Lines: <span id="lineValue">8</span></label>
                    <input type="range" id="linesCount" min="8" max="16" value="8">
                </div>

                <div class="hud-group collapsible">
                    <div id="petsToggleHeader" class="section-header">
                        <label>Active Pets</label>
                        <span id="petsToggleIcon" class="toggle-icon">▼</span>
                    </div>
                    <div class="pet-toggles collapsed" id="petToggles">
                    </div>
                </div>

                <div class="hud-group collapsible">
                    <div id="statsToggleHeader" class="section-header">
                        <label>Statistics</label>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="stats-display collapsed" id="statsDisplay"></div>
                </div>

                <div class="hud-group collapsible">
                    <div id="challengesToggleHeader" class="section-header">
                        <label>Daily Challenges</label>
                        <span id="challengesToggleIcon" class="toggle-icon">▼</span>
                    </div>
                    <div class="challenges-display collapsed" id="challengesDisplay"></div>
                </div>

                <div class="hud-group">
                    <label>Auto Play Speed</label>
                    <select id="autoPlaySpeed">
                        <option value="slow">Slow</option>
                        <option value="normal" selected>Normal</option>
                        <option value="fast">Fast</option>
                        <option value="turbo">Turbo</option>
                    </select>
                </div>

                <div class="actions">
                    <button id="playBtn" class="primary-btn">PLAY</button>
                    <button id="autoPlayBtn" class="secondary-btn">AUTO PLAY</button>
                    <button id="receiptBtn" class="secondary-btn">SAVE RECEIPT</button>
                </div>
            </aside>
        </div>

        <!-- Bottom Section: Pets Area -->
        <div class="pets-section">
            <canvas id="petsCanvas"></canvas>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverOverlay" class="tutorial-overlay hidden"></div>
    <div id="gameOverBox" class="tutorial-box game-over-box hidden">
        <h2 class="game-over-title">YOU LOSE</h2>
        <img src="Sprites/tenor.gif" alt="You Lose" class="game-over-gif">
        <div class="game-over-actions">
            <button id="tryAgainBtn" class="primary-btn">Try Again</button>
            <button id="cancelGameOverBtn" class="secondary-btn">Cancel</button>
        </div>
    </div>

    <!-- Tutorial System -->
    <div id="tutorialOverlay" class="tutorial-overlay hidden"></div>
    <div id="tutorialBox" class="tutorial-box hidden">
        <div class="tutorial-header">
            <span class="tutorial-title">RollyRoyal Guide</span>
            <button id="skipTutorial" class="skip-link">Skip</button>
        </div>
        <div class="tutorial-content" id="tutorialContent">
            <!-- Step content injected here -->
        </div>
        <div class="tutorial-footer">
            <div class="step-dots" id="stepDots"></div>
            <button id="nextStep" class="primary-btn tutorial-next">NEXT</button>
        </div>
    </div>

    <!-- Shop Modal -->
    <div id="shopOverlay" class="tutorial-overlay hidden"></div>
    <div id="shopBox" class="tutorial-box shop-box hidden">
        <div class="tutorial-header">
            <span class="tutorial-title">🛒 Shop</span>
            <button id="closeShop" class="skip-link">Close</button>
        </div>
        <div class="shop-content">
            <div class="shop-balance">
                <span id="shopStars">⭐ 1000</span>
            </div>

            <div class="shop-section">
                <h3>⚡ Power-ups</h3>
                <div id="powerupsShop" class="shop-grid"></div>
            </div>

            <div class="shop-section">
                <h3>🐾 Pets (Coming Soon)</h3>
                <div id="petsShop" class="shop-grid locked">
                    <p style="text-align: center; opacity: 0.5;">Pet customization coming soon!</p>
                </div>
            </div>

            <div class="shop-section">
                <h3>🎨 Themes</h3>
                <div id="themesShop" class="shop-grid"></div>
            </div>
        </div>
    </div>

    <!-- Achievements Modal -->
    <div id="achievementsOverlay" class="tutorial-overlay hidden"></div>
    <div id="achievementsBox" class="tutorial-box achievements-box hidden">
        <div class="tutorial-header">
            <span class="tutorial-title">🏆 Achievements</span>
            <button id="closeAchievements" class="skip-link">Close</button>
        </div>
        <div class="achievements-content" id="achievementsContent"></div>
    </div>

    <div id="keyboardHint" class="keyboard-hint">
        <div><kbd>Space</kbd> / <kbd>Enter</kbd> Rapid Fire Play!</div>
        <div><kbd>M</kbd> Mute/Unmute</div>
        <div><kbd>?</kbd> / <kbd>H</kbd> Help</div>
        <div><kbd>Ctrl+R</kbd> Reset</div>
    </div>

    <script src="script/script.js"></script>
</body>
</html>
